openapi: 3.1.0
info:
  title: The Cab Connected Wallet Entry API
  version: 1.0.0
  summary: Session bootstrap and live-refresh contract for the connected-wallet ledger entry flow.
servers:
  - url: http://localhost:3000
paths:
  /api/analysis-sessions:
    post:
      summary: Create or resume the Base analysis session for the connected wallet.
      operationId: createOrResumeConnectedWalletSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnalysisSessionRequest'
      responses:
        '201':
          description: Session created or resumed for the connected wallet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisSessionSummary'
  /api/analysis-sessions/{sessionId}:
    get:
      summary: Read current session and run status for a wallet analysis session.
      operationId: getAnalysisSessionStatus
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session status summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatusResponse'
  /api/analysis-sessions/{sessionId}/reconstructions:
    post:
      summary: Start a live reconstruction refresh for the wallet analysis session.
      operationId: startLiveReconstructionRefresh
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartReconstructionRequest'
      responses:
        '202':
          description: Reconstruction run accepted and tracked under the session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconstructionRunSummary'
components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
  schemas:
    CreateAnalysisSessionRequest:
      type: object
      required:
        - walletAddress
        - chainId
      properties:
        walletAddress:
          type: string
        chainId:
          type: integer
          enum: [8453]
        connectionSource:
          type: string
          default: walletconnect
      example:
        walletAddress: 0x2000000000000000000000000000000000000002
        chainId: 8453
        connectionSource: walletconnect
    AnalysisSessionSummary:
      type: object
      required:
        - sessionId
        - walletAddress
        - chainId
        - status
        - reusedSession
      properties:
        sessionId:
          type: string
        walletAddress:
          type: string
        chainId:
          type: integer
          enum: [8453]
        status:
          type: string
          enum: [active, archived, failed]
        reusedSession:
          type: boolean
        latestAcceptedRunId:
          type: string
          nullable: true
      example:
        sessionId: session_abc123
        walletAddress: 0x2000000000000000000000000000000000000002
        chainId: 8453
        status: active
        reusedSession: true
        latestAcceptedRunId: run_prev123
    ReconstructionRunSummary:
      type: object
      required:
        - reconstructionRunId
        - sessionId
        - runMode
        - status
        - classifierVersion
        - heuristicsVersion
        - startedAt
      properties:
        reconstructionRunId:
          type: string
        sessionId:
          type: string
        runMode:
          type: string
          enum: [initial, incremental, replay]
        status:
          type: string
          enum: [pending, ingesting, normalizing, projecting, accepted, failed]
        classifierVersion:
          type: string
        heuristicsVersion:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        errorSummary:
          type: string
          nullable: true
      example:
        reconstructionRunId: run_live456
        sessionId: session_abc123
        runMode: initial
        status: ingesting
        classifierVersion: 2026-04-19.1
        heuristicsVersion: 2026-04-19.1
        startedAt: 2026-04-19T17:00:00.000Z
        completedAt: null
        errorSummary: null
    SessionStatusResponse:
      type: object
      required:
        - session
        - latestAcceptedRun
        - latestRun
        - lastFailure
        - hasAcceptedProjection
      properties:
        session:
          $ref: '#/components/schemas/AnalysisSessionSummary'
        latestAcceptedRun:
          allOf:
            - $ref: '#/components/schemas/ReconstructionRunSummary'
          nullable: true
        latestRun:
          allOf:
            - $ref: '#/components/schemas/ReconstructionRunSummary'
          nullable: true
        lastFailure:
          allOf:
            - $ref: '#/components/schemas/ReconstructionRunSummary'
          nullable: true
        hasAcceptedProjection:
          type: boolean
      example:
        session:
          sessionId: session_abc123
          walletAddress: 0x2000000000000000000000000000000000000002
          chainId: 8453
          status: active
          reusedSession: true
          latestAcceptedRunId: run_prev123
        latestAcceptedRun:
          reconstructionRunId: run_prev123
          sessionId: session_abc123
          runMode: initial
          status: accepted
          classifierVersion: 2026-04-19.1
          heuristicsVersion: 2026-04-19.1
          startedAt: 2026-04-19T16:40:00.000Z
          completedAt: 2026-04-19T16:40:18.000Z
          errorSummary: null
        latestRun:
          reconstructionRunId: run_live456
          sessionId: session_abc123
          runMode: incremental
          status: normalizing
          classifierVersion: 2026-04-19.1
          heuristicsVersion: 2026-04-19.1
          startedAt: 2026-04-19T17:00:00.000Z
          completedAt: null
          errorSummary: null
        lastFailure: null
        hasAcceptedProjection: true