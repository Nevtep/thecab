openapi: 3.1.0
info:
  title: The Cab Accounting API
  version: 1.0.0
  summary: Versioned application contract for wallet-scoped valuation and portfolio accounting on top of the canonical ledger.
servers:
  - url: http://localhost:3000
paths:
  /api/analysis-sessions/{sessionId}/accounting:
    get:
      summary: Get the latest pricing and accounting snapshot for a wallet analysis session.
      operationId: getAccountingSnapshot
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Accounting snapshot derived from the latest accepted ledger run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioAccountingResponse'
components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
  schemas:
    MoneyValue:
      type: object
      required: [currency, amount]
      properties:
        currency:
          type: string
          enum: [usd]
        amount:
          type: string
      example:
        currency: usd
        amount: '12450.2387'
    CoverageSummary:
      type: object
      required: [coverageStatus, pricedValue, unpricedComponentsCount]
      properties:
        coverageStatus:
          type: string
          enum: [full, partial]
        pricedValue:
          $ref: '#/components/schemas/MoneyValue'
        excludedValue:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          nullable: true
        unpricedComponentsCount:
          type: integer
          minimum: 0
        reasonCodes:
          type: array
          items:
            type: string
      example:
        coverageStatus: partial
        pricedValue:
          currency: usd
          amount: '11800.5000'
        excludedValue:
          currency: usd
          amount: '650.2100'
        unpricedComponentsCount: 2
        reasonCodes: [missing_historical_price, unsupported_token_pricing]
    TraceRefs:
      type: object
      properties:
        ledgerRecordIds:
          type: array
          items:
            type: string
        pricePointIds:
          type: array
          items:
            type: string
    PositionAccountingSummary:
      type: object
      required:
        [positionInstanceId, positionType, currentValue, capitalEntered, capitalWithdrawn, realizedPnl, unrealizedPnl, precisionStatus, coverageSummary]
      properties:
        positionInstanceId:
          type: string
        positionType:
          type: string
          enum: [manual_cl, mellow_exposure]
        currentValue:
          $ref: '#/components/schemas/MoneyValue'
        capitalEntered:
          $ref: '#/components/schemas/MoneyValue'
        capitalWithdrawn:
          $ref: '#/components/schemas/MoneyValue'
        realizedPnl:
          $ref: '#/components/schemas/MoneyValue'
        unrealizedPnl:
          $ref: '#/components/schemas/MoneyValue'
        precisionStatus:
          type: string
          enum: [exact, rolled_up]
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        traceRefs:
          $ref: '#/components/schemas/TraceRefs'
    StrategyAccountingSummary:
      type: object
      required:
        [strategyId, strategyType, currentValue, capitalEntered, capitalWithdrawn, realizedPnl, unrealizedPnl, coverageSummary, positions]
      properties:
        strategyId:
          type: string
        strategyType:
          type: string
          enum: [manual, mellow_auto]
        currentValue:
          $ref: '#/components/schemas/MoneyValue'
        capitalEntered:
          $ref: '#/components/schemas/MoneyValue'
        capitalWithdrawn:
          $ref: '#/components/schemas/MoneyValue'
        realizedPnl:
          $ref: '#/components/schemas/MoneyValue'
        unrealizedPnl:
          $ref: '#/components/schemas/MoneyValue'
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        positions:
          type: array
          items:
            $ref: '#/components/schemas/PositionAccountingSummary'
        traceRefs:
          $ref: '#/components/schemas/TraceRefs'
    PoolAccountingSummary:
      type: object
      required:
        [poolId, displayName, currentValue, capitalEntered, capitalWithdrawn, realizedPnl, unrealizedPnl, coverageSummary, strategies]
      properties:
        poolId:
          type: string
        displayName:
          type: string
        currentValue:
          $ref: '#/components/schemas/MoneyValue'
        capitalEntered:
          $ref: '#/components/schemas/MoneyValue'
        capitalWithdrawn:
          $ref: '#/components/schemas/MoneyValue'
        realizedPnl:
          $ref: '#/components/schemas/MoneyValue'
        unrealizedPnl:
          $ref: '#/components/schemas/MoneyValue'
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        strategies:
          type: array
          items:
            $ref: '#/components/schemas/StrategyAccountingSummary'
        traceRefs:
          $ref: '#/components/schemas/TraceRefs'
    IdleBalanceSummary:
      type: object
      required: [tokenAddress, amountRaw, coverageStatus, reasonCode]
      properties:
        tokenAddress:
          type: string
        symbol:
          type: string
          nullable: true
        amountRaw:
          type: string
        currentValue:
          allOf:
            - $ref: '#/components/schemas/MoneyValue'
          nullable: true
        coverageStatus:
          type: string
          enum: [priced, partial, unpriced]
        reasonCode:
          type: string
        candidatePoolIds:
          type: array
          items:
            type: string
        traceRefs:
          $ref: '#/components/schemas/TraceRefs'
    PortfolioAccountingResponse:
      type: object
      required:
        [contractVersion, sessionId, acceptedRunId, asOf, quoteCurrency, totalValue, capitalEntered, capitalWithdrawn, realizedPnl, unrealizedPnl, idleBalanceValue, coverageSummary, pools, idleBalances]
      properties:
        contractVersion:
          type: string
        sessionId:
          type: string
        acceptedRunId:
          type: string
        asOf:
          type: string
          format: date-time
        quoteCurrency:
          type: string
          enum: [usd]
        totalValue:
          $ref: '#/components/schemas/MoneyValue'
        capitalEntered:
          $ref: '#/components/schemas/MoneyValue'
        capitalWithdrawn:
          $ref: '#/components/schemas/MoneyValue'
        realizedPnl:
          $ref: '#/components/schemas/MoneyValue'
        unrealizedPnl:
          $ref: '#/components/schemas/MoneyValue'
        idleBalanceValue:
          $ref: '#/components/schemas/MoneyValue'
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        pools:
          type: array
          items:
            $ref: '#/components/schemas/PoolAccountingSummary'
        idleBalances:
          type: array
          items:
            $ref: '#/components/schemas/IdleBalanceSummary'
        traceRefs:
          $ref: '#/components/schemas/TraceRefs'
      example:
        contractVersion: 1.0.0
        sessionId: session_abc123
        acceptedRunId: run_accepted_123
        asOf: 2026-04-19T18:00:00.000Z
        quoteCurrency: usd
        totalValue:
          currency: usd
          amount: '12450.2387'
        capitalEntered:
          currency: usd
          amount: '10000.0000'
        capitalWithdrawn:
          currency: usd
          amount: '1500.0000'
        realizedPnl:
          currency: usd
          amount: '975.1100'
        unrealizedPnl:
          currency: usd
          amount: '3475.1287'
        idleBalanceValue:
          currency: usd
          amount: '820.4400'
        coverageSummary:
          coverageStatus: partial
          pricedValue:
            currency: usd
            amount: '12450.2387'
          excludedValue:
            currency: usd
            amount: '650.2100'
          unpricedComponentsCount: 2
          reasonCodes: [missing_current_price]
        pools: []
        idleBalances: []
        traceRefs:
          ledgerRecordIds: [ledger_1, ledger_2]
          pricePointIds: [price_1, price_2]