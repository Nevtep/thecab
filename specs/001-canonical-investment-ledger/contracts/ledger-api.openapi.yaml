openapi: 3.1.0
info:
  title: The Cab Ledger API
  version: 1.0.0
  summary: Versioned application contract for wallet-scoped canonical ledger reconstruction.
servers:
  - url: http://localhost:3000
paths:
  /api/analysis-sessions:
    post:
      summary: Create or resume a wallet analysis session.
      operationId: createAnalysisSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnalysisSessionRequest'
      responses:
        '201':
          description: Analysis session created or resumed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisSession'
  /api/analysis-sessions/{sessionId}/reconstructions:
    post:
      summary: Start a deterministic reconstruction run for the active wallet session.
      operationId: startReconstructionRun
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartReconstructionRequest'
      responses:
        '202':
          description: Reconstruction accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconstructionRun'
  /api/analysis-sessions/{sessionId}/ledger:
    get:
      summary: Get the latest accepted canonical ledger projection for a wallet session.
      operationId: getLedgerProjection
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Canonical ledger projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerProjectionResponse'
  /api/analysis-sessions/{sessionId}/ledger/events/{ledgerRecordId}:
    get:
      summary: Get one canonical ledger record with provenance and asset movements.
      operationId: getLedgerRecord
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/LedgerRecordId'
      responses:
        '200':
          description: Canonical ledger record detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerRecordDetailResponse'
  /api/analysis-sessions/{sessionId}/discarded-activity:
    get:
      summary: List discarded activity for a wallet session.
      operationId: listDiscardedActivity
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Discarded activity records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscardedActivityListResponse'
components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    LedgerRecordId:
      name: ledgerRecordId
      in: path
      required: true
      schema:
        type: string
  schemas:
    CreateAnalysisSessionRequest:
      type: object
      required: [walletAddress, chainId]
      properties:
        walletAddress:
          type: string
        chainId:
          type: integer
          enum: [8453]
        connectionSource:
          type: string
          default: walletconnect
      example:
        walletAddress: 0x2000000000000000000000000000000000000002
        chainId: 8453
        connectionSource: walletconnect
    AnalysisSession:
      type: object
      required: [sessionId, walletAddress, chainId, status]
      properties:
        sessionId:
          type: string
        walletAddress:
          type: string
        chainId:
          type: integer
        status:
          type: string
          enum: [active, archived, failed]
        latestAcceptedRunId:
          type: string
          nullable: true
      example:
        sessionId: session:8453:0x2000000000000000000000000000000000000002
        walletAddress: 0x2000000000000000000000000000000000000002
        chainId: 8453
        status: active
        latestAcceptedRunId: null
    StartReconstructionRequest:
      type: object
      properties:
        fromBlock:
          type: integer
          minimum: 0
        toBlock:
          type: integer
          minimum: 0
        mode:
          type: string
          enum: [initial, incremental, replay]
      example:
        mode: replay
    ReconstructionRun:
      type: object
      required:
        [reconstructionRunId, sessionId, status, classifierVersion, heuristicsVersion]
      properties:
        reconstructionRunId:
          type: string
        sessionId:
          type: string
        status:
          type: string
          enum: [pending, ingesting, normalizing, projecting, accepted, failed]
        classifierVersion:
          type: string
        heuristicsVersion:
          type: string
        fromBlock:
          type: integer
        toBlock:
          type: integer
      example:
        reconstructionRunId: run:8453:0x2000000000000000000000000000000000000002:1715200000
        sessionId: session:8453:0x2000000000000000000000000000000000000002
        status: accepted
        classifierVersion: 2026-04-19.1
        heuristicsVersion: 2026-04-19.1
        fromBlock: 20450000
        toBlock: 20450042
    LedgerProjectionResponse:
      type: object
      required:
        [contractVersion, classifierVersion, heuristicsVersion, sourceBlockRange, pools, residualHoldings, discardedSummary]
      properties:
        contractVersion:
          type: string
        classifierVersion:
          type: string
        heuristicsVersion:
          type: string
        sourceBlockRange:
          $ref: '#/components/schemas/BlockRange'
        pools:
          type: array
          items:
            $ref: '#/components/schemas/PoolLedger'
        residualHoldings:
          type: array
          items:
            $ref: '#/components/schemas/ResidualHolding'
        discardedSummary:
          $ref: '#/components/schemas/DiscardedSummary'
      example:
        contractVersion: 1.0.0
        classifierVersion: 2026-04-19.1
        heuristicsVersion: 2026-04-19.1
        sourceBlockRange:
          fromBlock: 20450000
          toBlock: 20450042
        pools:
          - poolId: pool:weth-usdc
            displayName: WETH / USDC
            poolAddress: 0x1111111111111111111111111111111111111111
            strategies:
              - strategyId: strategy:weth-usdc:manual
                strategyType: manual
                sourceContractAddress: 0x2222222222222222222222222222222222222222
                positions:
                  - positionInstanceId: position:weth-usdc:manual:101
                    positionType: manual_cl
                    status: open
                    identityReference: "101"
                    ledgerRecords:
                      - ledgerRecordId: ledger:manual-open:0xaaa
                        eventType: manual_position_opened
                        txHash: 0xaaa
                        timestamp: 2024-01-01T00:00:00.000Z
              - strategyId: strategy:weth-usdc:mellow
                strategyType: mellow_auto
                sourceContractAddress: 0x3333333333333333333333333333333333333333
                positions:
                  - positionInstanceId: position:weth-usdc:mellow:auto
                    positionType: mellow_exposure
                    status: open
                    identityReference: 0x3333333333333333333333333333333333333333
                    ledgerRecords:
                      - ledgerRecordId: ledger:mellow-deposit:0xbbb
                        eventType: mellow_deposit
                        txHash: 0xbbb
                        timestamp: 2024-01-01T01:00:00.000Z
        residualHoldings: []
        discardedSummary:
          totalCount: 0
          byReasonType: {}
    PoolLedger:
      type: object
      required: [poolId, displayName, strategies]
      properties:
        poolId:
          type: string
        displayName:
          type: string
        poolAddress:
          type: string
        strategies:
          type: array
          items:
            $ref: '#/components/schemas/StrategyLedger'
    StrategyLedger:
      type: object
      required: [strategyId, strategyType, positions]
      properties:
        strategyId:
          type: string
        strategyType:
          type: string
          enum: [manual, mellow_auto]
        sourceContractAddress:
          type: string
          nullable: true
        positions:
          type: array
          items:
            $ref: '#/components/schemas/PositionLifecycle'
    PositionLifecycle:
      type: object
      required: [positionInstanceId, positionType, status, ledgerRecords]
      properties:
        positionInstanceId:
          type: string
        positionType:
          type: string
          enum: [manual_cl, mellow_exposure]
        status:
          type: string
          enum: [open, partially_reduced, closed, burned, archived]
        identityReference:
          type: string
        ledgerRecords:
          type: array
          items:
            $ref: '#/components/schemas/LedgerRecordSummary'
    LedgerRecordSummary:
      type: object
      required: [ledgerRecordId, eventType, txHash, timestamp]
      properties:
        ledgerRecordId:
          type: string
        eventType:
          type: string
        txHash:
          type: string
        timestamp:
          type: string
          format: date-time
    LedgerRecordDetailResponse:
      type: object
      required: [contractVersion, record]
      properties:
        contractVersion:
          type: string
        record:
          $ref: '#/components/schemas/LedgerRecordDetail'
      example:
        contractVersion: 1.0.0
        record:
          ledgerRecordId: ledger:manual-open:0xaaa
          poolId: pool:weth-usdc
          strategyId: strategy:weth-usdc:manual
          positionInstanceId: position:weth-usdc:manual:101
          eventType: manual_position_opened
          txHash: 0xaaa
          blockNumber: 20450001
          timestamp: 2024-01-01T00:00:00.000Z
          explanation: Opened a manual Aerodrome concentrated liquidity position.
          sourceObservations:
            - rawObservationId: run:8453:0x2000000000000000000000000000000000000002:raw:0xaaa:tx
              sourceType: transaction
              role: primary_call
            - rawObservationId: run:8453:0x2000000000000000000000000000000000000002:raw:0xaaa:log:0
              sourceType: log
              role: transfer_evidence
          assetMovements:
            - assetMovementId: movement:0xaaa:weth:out
              tokenAddress: 0x4200000000000000000000000000000000000006
              symbol: WETH
              amountRaw: "1000000000000000000"
              direction: out
              movementRole: principal
            - assetMovementId: movement:0xaaa:usdc:out
              tokenAddress: 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913
              symbol: USDC
              amountRaw: "2500000000"
              direction: out
              movementRole: principal
    LedgerRecordDetail:
      type: object
      required:
        [ledgerRecordId, eventType, txHash, blockNumber, timestamp, sourceObservations, assetMovements]
      properties:
        ledgerRecordId:
          type: string
        poolId:
          type: string
          nullable: true
        strategyId:
          type: string
          nullable: true
        positionInstanceId:
          type: string
          nullable: true
        eventType:
          type: string
        txHash:
          type: string
        blockNumber:
          type: integer
        timestamp:
          type: string
          format: date-time
        explanation:
          type: string
        sourceObservations:
          type: array
          items:
            $ref: '#/components/schemas/SourceObservationRef'
        assetMovements:
          type: array
          items:
            $ref: '#/components/schemas/AssetMovement'
    SourceObservationRef:
      type: object
      required: [rawObservationId, sourceType, role]
      properties:
        rawObservationId:
          type: string
        sourceType:
          type: string
          enum: [block_header, transaction, receipt, log, trace_frame]
        role:
          type: string
          enum: [primary_call, supporting_log, trace_validation, transfer_evidence]
    AssetMovement:
      type: object
      required: [assetMovementId, tokenAddress, amountRaw, direction, movementRole]
      properties:
        assetMovementId:
          type: string
        tokenAddress:
          type: string
        symbol:
          type: string
        amountRaw:
          type: string
        direction:
          type: string
          enum: [in, out, internal]
        movementRole:
          type: string
          enum: [principal, reward, fee, swap_leg, residual_change]
    ResidualHolding:
      type: object
      required: [residualHoldingId, tokenAddress, amountRaw, attributionConfidence, reasonCode]
      properties:
        residualHoldingId:
          type: string
        tokenAddress:
          type: string
        symbol:
          type: string
        amountRaw:
          type: string
        attributionConfidence:
          type: number
        candidatePoolIds:
          type: array
          items:
            type: string
        reasonCode:
          type: string
          enum: [idle_wallet_balance, rebalance_leftover, unallocated_close_proceeds, low_confidence_attribution]
    DiscardedSummary:
      type: object
      required: [totalCount]
      properties:
        totalCount:
          type: integer
        byReasonType:
          type: object
          additionalProperties:
            type: integer
      example:
        totalCount: 1
        byReasonType:
          unsupported: 1
    DiscardedActivityListResponse:
      type: object
      required: [contractVersion, items]
      properties:
        contractVersion:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/DiscardedActivity'
      example:
        contractVersion: 1.0.0
        items:
          - discardedActivityId: discarded:0xccc
            txHash: 0xccc
            blockNumber: 20450100
            timestamp: 2024-01-01T03:00:00.000Z
            reasonType: unsupported
            reasonCode: unsupported_protocol_surface
            reasonMessage: Transaction touched an unsupported protocol contract.
            classifierVersion: 2026-04-19.1
            heuristicsVersion: 2026-04-19.1
            sourceObservationIds:
              - run:8453:0x3000000000000000000000000000000000000003:raw:0xccc:tx
    DiscardedActivity:
      type: object
      required: [discardedActivityId, txHash, blockNumber, timestamp, reasonType, reasonCode, reasonMessage, classifierVersion, heuristicsVersion, sourceObservationIds]
      properties:
        discardedActivityId:
          type: string
        txHash:
          type: string
        blockNumber:
          type: integer
        timestamp:
          type: string
          format: date-time
        reasonType:
          type: string
          enum: [unsupported, malicious, ambiguous, invalid]
        reasonCode:
          type: string
        reasonMessage:
          type: string
        classifierVersion:
          type: string
        heuristicsVersion:
          type: string
        sourceObservationIds:
          type: array
          items:
            type: string
    BlockRange:
      type: object
      required: [fromBlock, toBlock]
      properties:
        fromBlock:
          type: integer
        toBlock:
          type: integer