openapi: 3.1.0
info:
  title: The Cab Historical Portfolio Dashboard API
  version: 1.0.0
  description: |
    Product-facing dashboard read contracts for one connected wallet session on Base.
servers:
  - url: /api
paths:
  /analysis-sessions/{sessionId}/accounting/bootstrap:
    get:
      summary: Dashboard bootstrap and first-view state
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Bootstrap dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountingBootstrapResponse'
  /analysis-sessions/{sessionId}/reconstructions/{runId}/progress:
    get:
      summary: Reconstruction and hydration progress
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Progress payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconstructionProgressResponse'
  /analysis-sessions/{sessionId}/accounting/time-series:
    get:
      summary: Portfolio and pool historical chart data with event markers
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Time-series payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountingTimeSeriesResponse'
  /analysis-sessions/{sessionId}/accounting/rebalance-flows:
    get:
      summary: Cross-pool migration links for explainability
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Rebalance flow payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountingRebalanceFlowsResponse'
  /analysis-sessions/{sessionId}/dashboard/pools:
    get:
      summary: Pool list surface for dashboard drilldown
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Pool dashboard summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolDashboardListResponse'
  /analysis-sessions/{sessionId}/dashboard/pools/{poolId}:
    get:
      summary: Pool detail with strategy separation
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - name: poolId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pool detail payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolDashboardDetailResponse'
  /analysis-sessions/{sessionId}/dashboard/timeline:
    get:
      summary: Auditable event timeline markers
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Timeline payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineResponse'

components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string

  schemas:
    MoneyValue:
      type: object
      required: [currency, amount]
      properties:
        currency:
          type: string
          enum: [usd]
        amount:
          type: string

    AccountingBootstrapResponse:
      type: object
      required: [contractVersion, sessionId, walletAddress, chainId, hasAcceptedSnapshot, isReconstructionRunning, bootstrapState, snapshot, latestRun]
      properties:
        contractVersion:
          type: string
        sessionId:
          type: string
        walletAddress:
          type: string
        chainId:
          type: integer
        hasAcceptedSnapshot:
          type: boolean
        isReconstructionRunning:
          type: boolean
        bootstrapState:
          type: string
          enum: [empty, warming, ready]
        snapshot:
          nullable: true
          type: object
        latestRun:
          nullable: true
          type: object

    ReconstructionProgressResponse:
      type: object
      required: [reconstructionRunId, sessionId, runMode, status, startedAt, hydration]
      properties:
        reconstructionRunId:
          type: string
        sessionId:
          type: string
        runMode:
          type: string
          enum: [initial, incremental, replay]
        status:
          type: string
          enum: [pending, ingesting, normalizing, projecting, accepted, failed]
        fromBlock:
          type: integer
          nullable: true
        toBlock:
          type: integer
          nullable: true
        checkpointBlock:
          type: integer
          nullable: true
        latestProcessedBlock:
          type: integer
          nullable: true
        progressPercent:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        errorSummary:
          type: string
          nullable: true
        hydration:
          type: object
          required: [queued, processing, retry, hydrated, failed, total]
          properties:
            queued: { type: integer }
            processing: { type: integer }
            retry: { type: integer }
            hydrated: { type: integer }
            failed: { type: integer }
            total: { type: integer }

    AccountingTimeSeriesResponse:
      type: object
      required: [contractVersion, sessionId, acceptedRunId, quoteCurrency, portfolioSeries, poolSeries, eventMarkers]
      properties:
        contractVersion:
          type: string
        sessionId:
          type: string
        acceptedRunId:
          type: string
          nullable: true
        quoteCurrency:
          type: string
          enum: [usd]
        portfolioSeries:
          type: array
          items:
            type: object
        poolSeries:
          type: array
          items:
            type: object
        eventMarkers:
          type: array
          items:
            type: object

    AccountingRebalanceFlowsResponse:
      type: object
      required: [contractVersion, sessionId, acceptedRunId, flows]
      properties:
        contractVersion:
          type: string
        sessionId:
          type: string
        acceptedRunId:
          type: string
          nullable: true
        flows:
          type: array
          items:
            type: object

    PoolDashboardListResponse:
      type: object
      required: [sessionId, acceptedRunId, pools]
      properties:
        sessionId:
          type: string
        acceptedRunId:
          type: string
          nullable: true
        pools:
          type: array
          items:
            type: object

    PoolDashboardDetailResponse:
      type: object
      required: [sessionId, acceptedRunId, pool]
      properties:
        sessionId:
          type: string
        acceptedRunId:
          type: string
          nullable: true
        pool:
          type: object

    TimelineResponse:
      type: object
      required: [sessionId, acceptedRunId, markers]
      properties:
        sessionId:
          type: string
        acceptedRunId:
          type: string
          nullable: true
        markers:
          type: array
          items:
            type: object
